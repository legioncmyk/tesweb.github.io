<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZALLSTORE - Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
</head>
<body>
    <nav class="bottom-nav">
        <a href="/" class="nav-item" data-link><ion-icon name="home-outline"></ion-icon><span>Home</span></a>
        <a href="/premium.html" class="nav-item" data-link><ion-icon name="diamond-outline"></ion-icon><span>Premium</span></a>
        <a href="/jasa.html" class="nav-item" data-link><ion-icon name="camera-outline"></ion-icon><span>Jasa</span></a>
        <a href="/dashboard.html" class="nav-item" data-link><ion-icon name="person-outline"></ion-icon><span>Dashboard</span></a>
        <a href="/admin.html" class="nav-item active" data-link><ion-icon name="shield-outline"></ion-icon><span>Admin</span></a>
    </nav>

    <main class="container">
        <div class="admin-container">
            <div id="admin-login" class="glass-card">
                <h2>🔒 Admin Access</h2>
                <input type="text" id="admin-username" placeholder="Admin Username">
                <input type="password" id="admin-password" placeholder="Password">
                <button id="admin-login-btn" class="btn-primary">Login as Admin</button>
                <p class="demo-hint">Admin: admin / admin123</p>
            </div>

            <div id="admin-panel" style="display:none;">
                <div class="admin-header">
                    <h2>⚙️ Admin Dashboard - Manajemen Produk</h2>
                    <button id="admin-logout-btn" class="btn-secondary">Logout Admin</button>
                </div>
                
                <div class="add-product-form glass-card">
                    <h3>Tambah Produk Baru</h3>
                    <input type="text" id="new-product-name" placeholder="Nama Produk">
                    <input type="number" id="new-product-price" placeholder="Harga">
                    <input type="number" id="new-product-stock" placeholder="Stok">
                    <select id="new-product-status">
                        <option value="tersedia">Tersedia</option>
                        <option value="habis">Habis</option>
                    </select>
                    <button id="add-product-btn" class="btn-primary">Tambah Produk</button>
                </div>

                <div id="admin-products-list" class="products-grid admin-grid">
                    <!-- dynamic products with edit/delete -->
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
